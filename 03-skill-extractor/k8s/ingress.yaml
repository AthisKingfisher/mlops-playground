# Traefik middleware: strip the /skills prefix before forwarding to the app.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: skills-stripprefix
spec:
  stripPrefix:
    prefixes:
      - /skills
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: skill-extractor
  labels:
    app: skill-extractor
  annotations:
    # attach the middleware above (format: <namespace>-<name>@kubernetescrd)
    traefik.ingress.kubernetes.io/router.middlewares: default-skills-stripprefix@kubernetescrd
spec:
  rules:
    - http:
        paths:
          - path: /skills
            pathType: Prefix
            backend:
              service:
                name: skill-extractor
                port:
                  number: 80