apiVersion: apps/v1
kind: Deployment
metadata:
  name: skill-extractor
  labels:
    app: skill-extractor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: skill-extractor
  template:
    metadata:
      labels:
        app: skill-extractor
    spec:
      containers:
        - name: skill-extractor
          image: skill-extractor:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10