name: CI - Skill Extractor

on:
  push:
    paths:
      - "03-skill-extractor/**"
      - ".github/workflows/ci-skill-extractor.yml"
  pull_request:
    paths:
      - "03-skill-extractor/**"

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 03-skill-extractor
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests
        run: pytest -v

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: 03-skill-extractor
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build -t skill-extractor:ci .