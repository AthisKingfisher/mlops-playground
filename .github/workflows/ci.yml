name: CI

# When to run: on pushes and PRs that touch the sentiment API project.
on:
  push:
    paths:
      - "01-sentiment-api/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "01-sentiment-api/**"

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    # All commands run inside the project subfolder.
    defaults:
      run:
        working-directory: 01-sentiment-api

    steps:
      # 1. Get the code onto the runner.
      - name: Check out repository
        uses: actions/checkout@v5

      # 2. Install Python.
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # 3. Install dependencies.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Lint - fail the build on style/bug issues.
      - name: Lint with ruff
        run: ruff check .

      # 5. Test - fail the build if any test fails.
      - name: Run tests
        run: pytest -v

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test          # only runs if the test job passed

    defaults:
      run:
        working-directory: 01-sentiment-api

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      # Build the image to prove the Dockerfile is valid.
      # We don't push it anywhere yet - just verify it builds.
      - name: Build Docker image
        run: docker build -t sentiment-api:ci .