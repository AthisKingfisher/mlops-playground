apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentiment-api
  labels:
    app: sentiment-api
spec:
  replicas: 1                    # how many copies of the Pod to run
  selector:
    matchLabels:
      app: sentiment-api         # this Deployment manages Pods with this label
  template:                      # the Pod "blueprint" the Deployment stamps out
    metadata:
      labels:
        app: sentiment-api       # label stamped onto each Pod (must match selector)
    spec:
      containers:
        - name: sentiment-api
          image: sentiment-api:0.1.0
          imagePullPolicy: IfNotPresent   # use the local/imported image, don't force a pull
          ports:
            - containerPort: 8000          # the port your app listens on inside the container
          livenessProbe:                   # Kubernetes uses /health to know the app is alive
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:                  # and to know it's ready to receive traffic
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10