apiVersion: v1
kind: Service
metadata:
  name: sentiment-api
  labels:
    app: sentiment-api
spec:
  selector:
    app: sentiment-api        # route to Pods carrying this label
  ports:
    - name: http
      port: 80                 # the port the Service listens on (inside the cluster)
      targetPort: 8000         # the port on the Pod/container to forward to
  type: ClusterIP              # stable internal-only address (the default)