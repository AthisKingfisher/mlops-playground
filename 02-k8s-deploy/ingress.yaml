apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sentiment-api
  labels:
    app: sentiment-api
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sentiment-api      # route to THIS Service
                port:
                  number: 80             # the Service's port (not the container's)